<!-- AOS 动画库 -->
<link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.AOS) {
      AOS.init({
        once: true, // 动画只触发一次
        duration: 800, // 动画持续时间
        easing: 'ease-in-out',
      });
    }
  });
</script>
