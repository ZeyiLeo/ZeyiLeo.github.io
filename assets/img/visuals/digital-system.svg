      .label{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',Arial,sans-serif;font-weight:700;letter-spacing:.14em;fill:#d9e6ff;fill-opacity:.72;font-size:26px;text-transform:uppercase}
      .title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',Arial,sans-serif;font-weight:800;fill:#f5f8ff;font-size:58px;letter-spacing:-.06em}
      .micro{font-family:-apple-system,BlinkMacSystemFont,'SF Mono',monospace;fill:#9fb3c8;font-size:20px}
