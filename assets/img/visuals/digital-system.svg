<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Digital System</title>
  <desc id="desc">portfolio · storytelling · web presence</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#1d1233"/>
    </linearGradient>
    <radialGradient id="a" cx="25%" cy="20%" r="70%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.65"/>
      <stop offset="0.45" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="80%" cy="70%" r="65%">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="0.46" stop-color="#f472b6" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
    <style>
