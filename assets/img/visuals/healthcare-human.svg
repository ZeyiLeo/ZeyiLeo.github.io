  <rect width="1200" height="760" rx="56" fill="url(#bg)"/>
  <rect width="1200" height="760" rx="56" fill="url(#a)"/>
  <rect width="1200" height="760" rx="56" fill="url(#b)"/>
  <g opacity=".38">
