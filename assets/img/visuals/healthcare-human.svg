<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Human Care</title>
  <desc id="desc">clinical knowledge, spoken clearly</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#1d1233"/>
    </linearGradient>
    <radialGradient id="a" cx="25%" cy="20%" r="70%">
      <stop offset="0" stop-color="#ef4444" stop-opacity="0.65"/>
      <stop offset="0.45" stop-color="#ef4444" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="b" cx="80%" cy="70%" r="65%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="0.46" stop-color="#38bdf8" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="16"/></filter>
    <style>
      .thin{fill:none;stroke:#f7fbff;stroke-opacity:.16;stroke-width:2}
      .line{fill:none;stroke:#f7fbff;stroke-opacity:.34;stroke-width:3;stroke-linecap:round}
      .accent{fill:none;stroke:#ef4444;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
      .accent2{fill:none;stroke:#38bdf8;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .dot{fill:#f7fbff;fill-opacity:.82}
      .soft{fill:#f7fbff;fill-opacity:.08}
      .label{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',Arial,sans-serif;font-weight:700;letter-spacing:.14em;fill:#d9e6ff;fill-opacity:.72;font-size:26px;text-transform:uppercase}
      .title{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',Arial,sans-serif;font-weight:800;fill:#f5f8ff;font-size:58px;letter-spacing:-.06em}
      .micro{font-family:-apple-system,BlinkMacSystemFont,'SF Mono',monospace;fill:#9fb3c8;font-size:20px}
    </style>
